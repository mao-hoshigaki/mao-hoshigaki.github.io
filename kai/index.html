<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ff8fc0">
<title>The power of shellfish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="hud">
    <button id="logo-btn" aria-label="一時停止">
      <img id="hud-logo" src="images/gamerogo.png" alt="The power of shellfish">
    </button>

    <div id="hud-bar">
      <div id="timer-panel" class="hud-cell">
        <span class="timer-label">カウントダウン</span>
        <span id="timer-value">60</span>
      </div>

      <div id="score-panel" class="hud-cell">
        <span class="hud-label">SCORE</span>
        <span id="score-value">0</span>
      </div>
    </div>

    <button id="sound-toggle" class="icon-btn" aria-label="サウンド切替" aria-pressed="false">
      <svg id="icon-sound-on" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M4 9v6h4l5 5V4L8 9H4z"/>
        <path d="M16.5 8.5a5 5 0 0 1 0 7"/>
        <path d="M19 6a9 9 0 0 1 0 12"/>
      </svg>
      <svg id="icon-sound-off" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9v6h4l5 5V4L8 9H4z"/>
        <path d="M16 9l6 6"/>
        <path d="M22 9l-6 6"/>
      </svg>
    </button>
  </header>

  <div id="gauge-wrap" aria-label="スペシャルゲージ">
    <div id="gauge-fill"></div>
  </div>

  <div id="combo-banner"></div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <footer id="legend">
    <div class="legend-item legend-line">
      <img src="images/special1.png" alt="">
      <span>たてよこ1列ずつ消す</span>
    </div>
    <div class="legend-item legend-bomb">
      <img src="images/special2.png" alt="">
      <span>まわりを爆発</span>
    </div>
    <div class="legend-item legend-colorbomb">
      <img src="images/kai1.png" alt="">
      <span>光る貝を揃えると同色を全消し</span>
    </div>
  </footer>

  <div id="start-overlay" class="overlay">
    <div class="overlay-card">
      <h1><img src="images/gamerogo.png" alt="The power of shellfish" class="overlay-logo"></h1>
      <p class="overlay-desc">同じ絵柄を3つ以上つなげて消そう。<br>制限時間は60秒！<br>連鎖でスコアも時間も伸ばせ。</p>
      <button id="start-btn" class="primary-btn">タップしてスタート</button>
    </div>
  </div>

  <div id="result-overlay" class="overlay hidden">
    <div class="overlay-card">
      <h2>タイムアップ</h2>
      <p class="result-row">スコア <span id="result-score">0</span></p>
      <p class="result-row">ハイスコア <span id="result-highscore">0</span></p>

      <div class="name-entry" id="name-entry-result">
        <p class="rank-msg">TOP5入り！なまえをいれてね</p>
        <input class="name-input" id="name-input-result" type="text" maxlength="3" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="ABC">
        <div class="name-entry-actions">
          <button class="primary-btn small" id="name-submit-result" disabled>とうろく</button>
          <button class="text-btn" id="name-skip-result">とばす</button>
        </div>
      </div>

      <div class="ranking-box" id="ranking-box-result">
        <div class="ranking-title">RANKING</div>
        <ol class="ranking-list" id="ranking-list-result"></ol>
      </div>

      <button id="restart-btn" class="primary-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7"/>
          <path d="M21 3v6h-6"/>
        </svg>
        もう一度遊ぶ
      </button>
    </div>
  </div>

  <div id="pause-overlay" class="overlay hidden">
    <div class="overlay-card">
      <h2>一時停止中</h2>
      <p class="overlay-desc">最初からやり直しますか？<br>「再開する」で続きからプレイできます。</p>
      <div class="pause-actions">
        <button id="pause-resume-btn" class="primary-btn">再開する</button>
        <button id="pause-restart-btn" class="secondary-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3-6.7"/>
            <path d="M21 3v6h-6"/>
          </svg>
          最初からやり直す
        </button>
      </div>
    </div>
  </div>

</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDDkZaZ9apuL-9Zg62Xoi4L-VUFWVZ3YKw",
    authDomain: "mao-hoshigaki.firebaseapp.com",
    projectId: "mao-hoshigaki",
    storageBucket: "mao-hoshigaki.firebasestorage.app",
    messagingSenderId: "739001820476",
    appId: "1:739001820476:web:b0b3f3c9c928cec8a5aa39"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const rankingCol = collection(db, "kaiRanking");

  async function fetchTop(n) {
    const q = query(rankingCol, orderBy("score", "desc"), limit(n));
    const snap = await getDocs(q);
    const list = [];
    snap.forEach(doc => {
      const d = doc.data();
      list.push({ name: d.name, score: d.score });
    });
    return list;
  }

  async function addEntry(name, score) {
    await addDoc(rankingCol, { name, score, createdAt: serverTimestamp() });
  }

  window.KaiRanking = { fetchTop, add: addEntry };
</script>
<script src="game.js"></script>
</body>
</html>
