<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MAORIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --i:#21E6FF; --o:#FFE02D; --t:#FF2D9B; --s:#A6FF1F; --z:#FF4D5E; --j:#3D7BFF; --l:#FF9A1F;
    --ink:#2a1e3a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    min-height:100dvh;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.5) 1px, transparent 1.6px),
      radial-gradient(ellipse at 50% -10%, #2a1350 0%, #160b2e 55%, #0f0820 100%);
    background-size: 30px 30px, 100% 100%;
    background-repeat: repeat, no-repeat;
    font-family:'Fredoka','system-ui',sans-serif;
    color:#fff;
    overflow:hidden;
    touch-action:none;
    overscroll-behavior:none;
    display:flex;
    justify-content:center;
    user-select:none;
  }

  .app-wrap{
    width:100%; max-width:480px; height:100dvh;
    display:flex; flex-direction:column; gap:8px;
    padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
  }

  /* ---- titlebar ---- */
  .titlebar{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; border-radius:20px;
    background:linear-gradient(180deg,#ff5db1,#ff2d9b 45%,#b21e78);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.55), 0 0 20px rgba(255,45,155,.55);
  }
  .titlebar .title{
    font-family:'Baloo 2','Segoe UI',sans-serif; font-weight:800; font-size:1.25rem;
    display:flex; align-items:center; gap:6px; color:#fff;
    text-shadow:0 0 8px rgba(255,255,255,.8), 0 0 16px #ff2d9b;
  }
  .titlebar .cat-icon{width:26px; height:26px; color:var(--i); filter:drop-shadow(0 0 6px currentColor);}
  .titlebar .star{opacity:.9; width:14px; height:14px; color:#fff;}
  .title-actions{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .sound-btn{
    width:30px; height:30px; border-radius:50%; border:none; flex:0 0 auto;
    background:rgba(0,0,0,.28); color:#fff; font-size:1rem;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
  }
  .sound-btn svg{width:16px; height:16px;}
  .sound-btn:active{transform:translateY(1px);}
  .close-btn{
    border:none; border-radius:14px; flex:0 0 auto; padding:7px 14px;
    background:rgba(0,0,0,.28); color:#fff; font-weight:700; font-size:.75rem;
    font-family:'Baloo 2','Segoe UI',sans-serif; letter-spacing:.03em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
  }
  .close-btn:active{transform:translateY(1px);}

  /* ---- HUD ---- */
  .hud{flex:0 0 auto; display:flex; gap:6px;}
  .hud-card{
    flex:1; min-width:0; background:rgba(255,255,255,.07); border-radius:16px;
    padding:6px 6px; text-align:center; backdrop-filter: blur(2px);
  }
  .hud-card.level{ box-shadow: inset 0 0 0 1.5px var(--i); }
  .hud-card.score{ flex:1.5; box-shadow: inset 0 0 0 1.5px var(--t); }
  .hud-card.next{ box-shadow: inset 0 0 0 1.5px var(--s); }
  .hud-label{
    font-family:'Baloo 2','Segoe UI',sans-serif; font-size:.6rem; letter-spacing:.06em;
    opacity:.75; text-transform:uppercase;
  }
  .hud-score-value{
    font-weight:600; font-size:1.5rem; line-height:1.1; color:#fff;
    text-shadow:0 0 6px #ff2d9b, 0 0 16px #ff2d9b;
  }
  .hud-level-value{
    font-weight:600; font-size:1.5rem; line-height:1.1; color:#fff;
    text-shadow:0 0 6px var(--i), 0 0 16px var(--i);
    margin-top:2px;
  }
  .hud-sub{font-size:.65rem; opacity:.85; display:flex; gap:8px; justify-content:center; margin-top:2px;}
  .mini-grid{display:grid; grid-auto-rows:12px; grid-auto-columns:12px; gap:2px; justify-content:center; margin-top:3px;}
  .mini-cell{width:12px; height:12px; border-radius:4px;}

  /* ---- board ---- */
  .field-wrap{flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center;}
  .field{
    position:relative; background:#0b0715; border-radius:20px;
    box-shadow: 0 0 22px rgba(120,60,255,.35), inset 0 0 0 2px rgba(255,255,255,.05);
    overflow:hidden;
  }
  .field-layer{
    position:absolute; inset:0; display:grid;
    grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(20,1fr);
  }
  .grid-bg .bg-cell{border:1px solid rgba(255,255,255,.035);}
  .field-layer.overlay{pointer-events:none;}
  .block{border-radius:22%; position:relative;}
  .block svg{width:100%; height:100%; display:block; filter:drop-shadow(0 0 5px currentColor);}
  #locked-layer .block svg{
    filter: drop-shadow(0 0 3px currentColor) brightness(.85) saturate(.72);
  }
  #active-layer .block svg{
    animation: activeGlow 1.15s ease-in-out infinite;
  }
  @keyframes activeGlow{
    0%,100%{ filter: drop-shadow(0 0 5px currentColor) drop-shadow(0 0 9px currentColor); }
    50%{ filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 16px currentColor); }
  }
  .ghost-block{
    border-radius:22%; box-sizing:border-box;
    border:2px dashed var(--s); box-shadow:0 0 8px rgba(166,255,31,.5);
  }

  .popup{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; z-index:5;
  }
  .popup.show{animation:popFade 900ms ease-out;}
  @keyframes popFade{
    0%{opacity:0; transform:scale(.6);}
    15%{opacity:1; transform:scale(1.15);}
    30%{transform:scale(1);}
    75%{opacity:1;}
    100%{opacity:0; transform:scale(1.05) translateY(-10px);}
  }
  .popup-main{
    font-family:'Baloo 2','Segoe UI',sans-serif; font-weight:800; font-size:2rem;
    color:var(--s); text-shadow:0 0 10px var(--s), 0 0 24px var(--s);
  }
  .popup-sub{
    font-weight:600; font-size:1.2rem; color:#fff; text-shadow:0 0 8px #fff;
  }

  .overlay-panel{
    position:absolute; inset:0; background:rgba(10,5,20,.85);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:10; text-align:center; padding:20px;
    overflow-y:auto;
  }
  .overlay-panel.show{opacity:1; pointer-events:auto;}
  .overlay-panel h2{
    font-family:'Baloo 2','Segoe UI',sans-serif; font-size:1.6rem; margin:0;
    color:var(--t); text-shadow:0 0 10px var(--t), 0 0 22px var(--t);
  }
  .overlay-panel p{margin:0; font-size:.95rem; opacity:.9;}
  .gift-img{
    max-width:70%; max-height:40%; border-radius:16px; object-fit:contain;
    box-shadow: 0 0 24px rgba(255,224,45,.6);
  }
  .jelly-btn{
    border:none; border-radius:20px; padding:12px 26px; font-family:'Baloo 2','Segoe UI',sans-serif;
    font-weight:800; font-size:1rem; color:var(--ink);
    background:linear-gradient(180deg,#ff5db1,#ff2d9b);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.6), 0 6px 0 #b21e78, 0 8px 14px rgba(255,45,155,.4);
    display:inline-flex; align-items:center; gap:6px;
  }
  .jelly-btn svg{width:18px; height:18px; flex:0 0 auto;}
  .jelly-btn:active{transform:translateY(4px); box-shadow: inset 0 1px 0 rgba(255,255,255,.4);}
  .jelly-btn.small{padding:9px 20px; font-size:.85rem;}
  .jelly-btn:disabled{opacity:.4; pointer-events:none;}

  .gift-main, .gift-rank-section{display:flex; flex-direction:column; align-items:center; gap:14px; width:100%;}
  .gift-rank-section{display:none;}

  .name-entry{display:none; flex-direction:column; align-items:center; gap:8px; width:100%;}
  .rank-msg{color:var(--s); font-weight:600; margin:0;}
  .name-input{
    width:120px; text-align:center; letter-spacing:.3em; text-transform:uppercase;
    font-family:'Baloo 2','Segoe UI',sans-serif; font-weight:800; font-size:1.3rem;
    padding:8px 0; border-radius:12px; border:2px solid var(--i); color:var(--ink);
    background:#fff; outline:none;
  }
  .name-entry-actions{display:flex; align-items:center; gap:12px;}
  .text-btn{
    border:none; background:none; color:#fff; opacity:.7; font-size:.8rem;
    text-decoration:underline; font-family:'Fredoka','system-ui',sans-serif;
  }
  .text-btn:active{opacity:1;}

  .ranking-box{
    width:100%; max-width:260px; background:rgba(255,255,255,.06); border-radius:16px;
    padding:10px 14px; box-shadow: inset 0 0 0 1.5px var(--i);
  }
  .ranking-title{
    font-family:'Baloo 2','Segoe UI',sans-serif; font-size:.7rem; letter-spacing:.08em;
    color:var(--i); text-align:center; margin-bottom:6px;
  }
  .ranking-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:4px;}
  .ranking-list li{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-size:.9rem; padding:2px 4px;
  }
  .ranking-list .rk-pos{
    font-family:'Baloo 2','Segoe UI',sans-serif; font-weight:800; color:var(--s); width:1.4em; text-align:center;
  }
  .ranking-list .rk-name{flex:1; text-align:left; font-weight:600; letter-spacing:.05em;}
  .ranking-list .rk-score{font-weight:600; color:#fff; opacity:.9;}
  .ranking-list .rk-empty{opacity:.5; font-size:.8rem; text-align:center; width:100%; justify-content:center;}

  /* ---- controls ---- */
  .controls{
    flex:0 0 auto; display:flex; justify-content:space-between; align-items:flex-end;
    padding:2px 4px max(2px, env(safe-area-inset-bottom));
  }
  .dpad{display:flex; gap:10px; align-items:flex-start;}
  .btn{
    border:none; border-radius:20px; font-weight:800; color:var(--ink);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.6);
    transition: transform .08s, box-shadow .08s;
    display:flex; align-items:center; justify-content:center;
  }
  .btn svg{width:26px; height:26px;}
  .btn-rotate svg{width:34px; height:34px;}
  .btn-left,.btn-right{
    width:60px; height:82px; font-size:1.6rem;
    background:linear-gradient(180deg,#3affe0,#12c9ac);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.6), 0 6px 0 #0d9c85, 0 8px 14px rgba(18,201,172,.4);
  }
  .btn-drop{
    width:60px; height:82px; margin-top:34px; font-size:1.6rem;
    background:linear-gradient(180deg,#c4ff5a,#8fe01a);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.6), 0 6px 0 #6ea812, 0 8px 14px rgba(143,224,26,.4);
  }
  .btn-rotate{
    width:86px; height:86px; border-radius:50%; font-size:2rem; color:#fff;
    background:linear-gradient(180deg,#ff5db1,#ff2d9b);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.6), 0 6px 0 #b21e78, 0 8px 16px rgba(255,45,155,.5);
    text-shadow:0 0 8px #fff;
  }
  .btn:active{transform:translateY(4px); box-shadow: inset 0 1px 0 rgba(255,255,255,.4) !important;}
</style>
</head>

<div class="app-wrap">

  <div class="titlebar">
    <div class="title">
      <svg class="cat-icon" viewBox="0 0 100 100"><use href="#cat-T"/></svg>
      <span>MAORIS</span>
      <svg class="star"><use href="#icon-star"/></svg>
    </div>
    <div class="title-actions">
      <button class="sound-btn" id="sound-btn" aria-label="sound"><svg viewBox="0 0 24 24"><use id="sound-icon-use" href="#icon-sound-off"/></svg></button>
      <button class="close-btn" id="close-btn" aria-label="pause">PAUSE</button>
    </div>
  </div>

  <div class="hud">
    <div class="hud-card level">
      <div class="hud-label">LV</div>
      <div class="hud-level-value" id="level-value">1</div>
    </div>
    <div class="hud-card score">
      <div class="hud-label">SCORE</div>
      <div class="hud-score-value" id="score-value">0</div>
      <div class="hud-sub"><span>LINES <b id="lines-value">0</b></span></div>
    </div>
    <div class="hud-card next">
      <div class="hud-label">NEXT</div>
      <div class="mini-grid" id="next-box-0"></div>
    </div>
  </div>

  <audio id="bgm" src="audio/NEKOMATA!.mp3" loop preload="auto"></audio>
  <audio id="sfx-catris" src="audio/cat.mp3" preload="auto"></audio>
  <audio id="sfx-gameover" src="audio/cat2.mp3" preload="auto"></audio>
  <audio id="sfx-drop" src="audio/drop.mp3" preload="auto"></audio>

  <div class="field-wrap">
    <div class="field" id="field">
      <div class="field-layer grid-bg" id="grid-bg"></div>
      <div class="field-layer overlay" id="locked-layer"></div>
      <div class="field-layer overlay" id="ghost-layer"></div>
      <div class="field-layer overlay" id="active-layer"></div>
      <div class="popup" id="popup">
        <div class="popup-main" id="popup-main">&#12491;&#12515;&#12540;&#65281;</div>
        <div class="popup-sub" id="popup-sub">+100</div>
      </div>
      <div class="overlay-panel" id="pause-overlay">
        <h2>PAUSE</h2>
        <button class="jelly-btn" id="resume-btn"><svg viewBox="0 0 24 24"><use href="#icon-play"/></svg> つづき</button>
      </div>
      <div class="overlay-panel" id="gameover-overlay">
        <h2>GAME OVER</h2>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  var firebaseConfig = {
    apiKey: "AIzaSyDDkZaZ9apuL-9Zg62Xoi4L-VUFWVZ3YKw",
    authDomain: "mao-hoshigaki.firebaseapp.com",
    projectId: "mao-hoshigaki",
    storageBucket: "mao-hoshigaki.firebasestorage.app",
    messagingSenderId: "739001820476",
    appId: "1:739001820476:web:b0b3f3c9c928cec8a5aa39"
  };

  var app = initializeApp(firebaseConfig);
  var db = getFirestore(app);
  var rankingCol = collection(db, "maorisRanking");

  async function fetchTop(n){
    var q = query(rankingCol, orderBy("score","desc"), limit(n));
    var snap = await getDocs(q);
    var list = [];
    snap.forEach(function(doc){
      var d = doc.data();
      list.push({name:d.name, score:d.score});
    });
    return list;
  }

  async function addEntry(name, score){
    await addDoc(rankingCol, {name:name, score:score, createdAt:serverTimestamp()});
  }

  window.MaorisRanking = {fetchTop:fetchTop, add:addEntry};
</script>
<script>
(function(){
  "use strict";

  var COLS=10, ROWS=20;
  var SPEED_TABLE=[800,650,500,380,260];
  var SPEED_STAGE_DECAY=15;
  var SPEED_MIN=80;
  var SOFT_DROP_MULTIPLIER=8;
  var SOFT_DROP_MIN_INTERVAL=15;
  var LOCK_DELAY=500;
  var MAX_LOCK_RESETS=15;
  var DAS_DELAY=170, ARR_INTERVAL=50;
  var SCORE_TABLE={1:100,2:300,3:500,4:800};
  var SCORE_GIFT_THRESHOLD=99999;
  var RANKING_LIMIT=5;

  var COLORS={I:'#21E6FF',O:'#FFE02D',T:'#FF2D9B',S:'#A6FF1F',Z:'#FF4D5E',J:'#3D7BFF',L:'#FF9A1F'};
  var TYPES=['I','O','T','S','Z','J','L'];

  var SHAPES={
    I:[
      [[0,1],[1,1],[2,1],[3,1]],
      [[2,0],[2,1],[2,2],[2,3]],
      [[0,2],[1,2],[2,2],[3,2]],
      [[1,0],[1,1],[1,2],[1,3]]
    ],
    O:[
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]]
    ],
    T:[
      [[1,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[2,1],[1,2]],
      [[1,0],[0,1],[1,1],[1,2]]
    ],
    S:[
      [[1,0],[2,0],[0,1],[1,1]],
      [[1,0],[1,1],[2,1],[2,2]],
      [[1,1],[2,1],[0,2],[1,2]],
      [[0,0],[0,1],[1,1],[1,2]]
    ],
    Z:[
      [[0,0],[1,0],[1,1],[2,1]],
      [[2,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[1,2],[2,2]],
      [[1,0],[0,1],[1,1],[0,2]]
    ],
    J:[
      [[0,0],[0,1],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[1,2]],
      [[0,1],[1,1],[2,1],[2,2]],
      [[1,0],[1,1],[0,2],[1,2]]
    ],
    L:[
      [[2,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[1,2],[2,2]],
      [[0,1],[1,1],[2,1],[0,2]],
      [[0,0],[1,0],[1,1],[1,2]]
    ]
  };
  var KICKS=[[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1]];

  // ---- state ----
  var board = makeEmptyBoard();
  var bag = [];
  var queue = [];
  var current = null;
  var score = 0, totalLines = 0;
  var gravityAcc = 0;
  var lockTimer = null, lockResets = 0;
  var paused = false, gameOverFlag = false;
  var dasState = {dir:0, timer:0, fired:false};
  var softDropping = false;
  var lastTime = 0;
  var giftPendingScore = 0;

  function makeEmptyBoard(){
    var b=[];
    for(var r=0;r<ROWS;r++){ b.push(new Array(COLS).fill(0)); }
    return b;
  }

  function currentLevelIndex(){ return Math.floor(totalLines/10); }
  function currentLevelDisplay(){ return currentLevelIndex()+1; }

  function speedForStage(idx){
    if(idx < SPEED_TABLE.length) return SPEED_TABLE[idx];
    var over = idx - (SPEED_TABLE.length-1);
    return Math.max(SPEED_MIN, SPEED_TABLE[SPEED_TABLE.length-1] - over*SPEED_STAGE_DECAY);
  }

  function currentSpeedStageIndex(){
    var levelIndex0 = currentLevelIndex();
    var level = levelIndex0+1;
    var tier = Math.floor(level/10);
    return (levelIndex0%5) + tier;
  }

  function refillBag(){
    if(bag.length===0){
      bag = TYPES.slice();
      for(var i=bag.length-1;i>0;i--){
        var j=Math.floor(Math.random()*(i+1));
        var tmp=bag[i]; bag[i]=bag[j]; bag[j]=tmp;
      }
    }
    return bag.pop();
  }
  function fillQueue(){
    while(queue.length<3){ queue.push(refillBag()); }
  }

  function canPlace(type, rot, x, y){
    var shape = SHAPES[type][rot];
    for(var k=0;k<shape.length;k++){
      var bx = x+shape[k][0], by = y+shape[k][1];
      if(bx<0 || bx>=COLS || by>=ROWS) return false;
      if(by>=0 && board[by][bx]) return false;
    }
    return true;
  }

  function isResting(){
    return current && !canPlace(current.type, current.rot, current.x, current.y+1);
  }

  function onSuccessfulAction(){
    if(current && isResting() && lockResets<MAX_LOCK_RESETS){
      lockTimer = LOCK_DELAY;
      lockResets++;
    }
  }

  function moveActive(dx,dy){
    if(!current || paused || gameOverFlag) return false;
    if(canPlace(current.type, current.rot, current.x+dx, current.y+dy)){
      current.x += dx; current.y += dy;
      onSuccessfulAction();
      return true;
    }
    return false;
  }

  function rotateActive(){
    if(!current || paused || gameOverFlag) return;
    var newRot = (current.rot+1)%4;
    for(var i=0;i<KICKS.length;i++){
      var nx = current.x+KICKS[i][0], ny = current.y+KICKS[i][1];
      if(canPlace(current.type, newRot, nx, ny)){
        current.rot = newRot; current.x = nx; current.y = ny;
        onSuccessfulAction();
        return;
      }
    }
  }

  function ghostY(){
    var gy = current.y;
    while(canPlace(current.type, current.rot, current.x, gy+1)) gy++;
    return gy;
  }

  function spawnPiece(){
    fillQueue();
    var type = queue.shift();
    fillQueue();
    renderNext();
    var p = {type:type, rot:0, x:3, y:0};
    lockTimer = null; lockResets = 0;
    if(!canPlace(type,0,3,0)){
      current = p;
      triggerGameOver();
      return;
    }
    current = p;
  }

  function lockPiece(){
    if(!current) return;
    var shape = SHAPES[current.type][current.rot];
    for(var k=0;k<shape.length;k++){
      var bx = current.x+shape[k][0], by = current.y+shape[k][1];
      if(by>=0 && by<ROWS && bx>=0 && bx<COLS){ board[by][bx] = current.type; }
    }
    current = null;
    lockTimer = null; lockResets = 0;
    if(soundOn){
      sfxDrop.currentTime = 0;
      sfxDrop.play().catch(function(){});
    }
    clearLines();
    renderLocked();
    if(!gameOverFlag) spawnPiece();
  }

  function clearLines(){
    var count = 0;
    for(var r=ROWS-1;r>=0;r--){
      if(board[r].every(function(c){return c;})){
        board.splice(r,1);
        board.unshift(new Array(COLS).fill(0));
        count++; r++;
      }
    }
    if(count>0){
      score += SCORE_TABLE[count] || 0;
      totalLines += count;
      updateHUD();
      showPopup(count, SCORE_TABLE[count] || 0);
      if(count===4 && soundOn){
        sfxCatris.currentTime = 0;
        sfxCatris.play().catch(function(){});
      }
    }
  }

  function showPopup(count, points){
    var main = document.getElementById('popup-main');
    var sub = document.getElementById('popup-sub');
    var el = document.getElementById('popup');
    main.textContent = (count===4) ? 'フルニャー！' : 'ニャー！';
    sub.textContent = '+' + points;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  function triggerGameOver(){
    gameOverFlag = true;
    if(soundOn){
      sfxGameover.currentTime = 0;
      sfxGameover.play().catch(function(){});
    }
    if(score > SCORE_GIFT_THRESHOLD){
      giftPendingScore = score;
      document.getElementById('gift-score').textContent = score;
      document.getElementById('gift-main').style.display = '';
      document.getElementById('gift-rank-section').style.display = 'none';
      document.getElementById('gift-overlay').classList.add('show');
    } else {
      document.getElementById('final-score').textContent = score;
      document.getElementById('gameover-overlay').classList.add('show');
      goRankPanel.open(score);
    }
  }

  function resetGame(){
    board = makeEmptyBoard();
    bag = []; queue = [];
    score = 0; totalLines = 0;
    gravityAcc = 0; lockTimer = null; lockResets = 0;
    paused = false; gameOverFlag = false; softDropping = false;
    document.getElementById('gameover-overlay').classList.remove('show');
    document.getElementById('gift-overlay').classList.remove('show');
    document.getElementById('pause-overlay').classList.remove('show');
    document.getElementById('gift-main').style.display = '';
    document.getElementById('gift-rank-section').style.display = 'none';
    updateHUD();
    renderLocked();
    spawnPiece();
  }

  // ---- ranking ----
  function createRankingPanel(ids){
    var input = document.getElementById(ids.input);
    var submitBtn = document.getElementById(ids.submit);
    var skipBtn = document.getElementById(ids.skip);
    var entry = document.getElementById(ids.entry);
    var listEl = document.getElementById(ids.list);
    var scoreForEntry = 0;

    function renderList(list, message){
      listEl.innerHTML = '';
      if(message){
        var lim = document.createElement('li');
        lim.className = 'rk-empty';
        lim.textContent = message;
        listEl.appendChild(lim);
        return;
      }
      if(!list.length){
        var li0 = document.createElement('li');
        li0.className = 'rk-empty';
        li0.textContent = 'まだ記録がありません';
        listEl.appendChild(li0);
        return;
      }
      list.forEach(function(item, i){
        var li = document.createElement('li');
        var pos = document.createElement('span'); pos.className='rk-pos'; pos.textContent=(i+1);
        var name = document.createElement('span'); name.className='rk-name'; name.textContent=item.name;
        var sc = document.createElement('span'); sc.className='rk-score'; sc.textContent=item.score;
        li.appendChild(pos); li.appendChild(name); li.appendChild(sc);
        listEl.appendChild(li);
      });
    }

    function refresh(){
      renderList([], 'ランキングを確認中…');
      if(!window.MaorisRanking){
        renderList([], 'ランキング機能を読み込めませんでした');
        return Promise.resolve([]);
      }
      return window.MaorisRanking.fetchTop(RANKING_LIMIT).then(function(list){
        renderList(list, null);
        return list;
      }).catch(function(){
        renderList([], 'ランキングを取得できませんでした');
        return [];
      });
    }

    input.addEventListener('input', function(){
      var v = input.value.replace(/[^A-Za-z]/g,'').slice(0,3);
      if(v!==input.value) input.value = v;
      submitBtn.disabled = v.length<1;
    });

    skipBtn.addEventListener('click', function(){
      entry.style.display = 'none';
    });

    submitBtn.addEventListener('click', function(){
      var name = input.value.replace(/[^A-Za-z]/g,'').slice(0,3);
      if(name.length<1 || !window.MaorisRanking) return;
      submitBtn.disabled = true;
      window.MaorisRanking.add(name, scoreForEntry).then(function(){
        entry.style.display = 'none';
        return refresh();
      }).catch(function(){
        submitBtn.disabled = false;
        renderList([], '登録に失敗しました。通信環境をご確認ください');
      });
    });

    return {
      open: function(score){
        scoreForEntry = score;
        input.value = '';
        submitBtn.disabled = true;
        entry.style.display = 'none';
        refresh().then(function(list){
          var qualifies = list.length < RANKING_LIMIT || score > list[list.length-1].score;
          if(qualifies) entry.style.display = 'flex';
        });
      }
    };
  }

  // ---- rendering ----
  var gridBg = document.getElementById('grid-bg');
  var lockedLayer = document.getElementById('locked-layer');
  var ghostLayer = document.getElementById('ghost-layer');
  var activeLayer = document.getElementById('active-layer');
  var fieldEl = document.getElementById('field');

  function buildGridBg(){
    var frag = document.createDocumentFragment();
    for(var i=0;i<ROWS*COLS;i++){
      var d = document.createElement('div');
      d.className = 'bg-cell';
      frag.appendChild(d);
    }
    gridBg.appendChild(frag);
  }

  var CAT_SYMBOL = {I:'#cat-I', O:'#cat-O', T:'#cat-T', S:'#cat-S', Z:'#cat-Z', J:'#cat-J', L:'#cat-L'};

  function makeBlockEl(type, col, row){
    var d = document.createElement('div');
    d.className = 'block';
    d.style.gridColumn = (col+1)+' / span 1';
    d.style.gridRow = (row+1)+' / span 1';
    d.style.color = COLORS[type];
    d.innerHTML = '<svg viewBox="0 0 100 100"><use href="'+CAT_SYMBOL[type]+'"/></svg>';
    return d;
  }

  function renderLocked(){
    lockedLayer.innerHTML = '';
    var frag = document.createDocumentFragment();
    for(var r=0;r<ROWS;r++){
      for(var c=0;c<COLS;c++){
        var t = board[r][c];
        if(t){ frag.appendChild(makeBlockEl(t,c,r)); }
      }
    }
    lockedLayer.appendChild(frag);
  }

  function renderActiveAndGhost(){
    activeLayer.innerHTML = '';
    ghostLayer.innerHTML = '';
    if(!current) return;
    var shape = SHAPES[current.type][current.rot];
    var gy = ghostY();
    var fragG = document.createDocumentFragment();
    var fragA = document.createDocumentFragment();
    for(var k=0;k<shape.length;k++){
      var col = current.x+shape[k][0];
      var grow = gy+shape[k][1];
      var arow = current.y+shape[k][1];
      if(grow!==arow && grow>=0 && grow<ROWS){
        var gd = document.createElement('div');
        gd.className = 'ghost-block';
        gd.style.gridColumn = (col+1)+' / span 1';
        gd.style.gridRow = (grow+1)+' / span 1';
        fragG.appendChild(gd);
      }
      if(arow>=0 && arow<ROWS){
        fragA.appendChild(makeBlockEl(current.type, col, arow));
      }
    }
    ghostLayer.appendChild(fragG);
    activeLayer.appendChild(fragA);
  }

  function normalizeShape(shape){
    var minX=99,minY=99,maxX=-99,maxY=-99;
    shape.forEach(function(p){
      if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0];
      if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1];
    });
    return {cells:shape.map(function(p){return [p[0]-minX,p[1]-minY];}), w:maxX-minX+1, h:maxY-minY+1};
  }

  function renderMini(container, type){
    container.innerHTML = '';
    if(!type) return;
    var norm = normalizeShape(SHAPES[type][0]);
    container.style.gridTemplateColumns = 'repeat('+norm.w+',12px)';
    container.style.gridTemplateRows = 'repeat('+norm.h+',12px)';
    norm.cells.forEach(function(p){
      var d = document.createElement('div');
      d.className = 'mini-cell';
      d.style.gridColumn = (p[0]+1)+' / span 1';
      d.style.gridRow = (p[1]+1)+' / span 1';
      d.style.background = COLORS[type];
      d.style.boxShadow = '0 0 6px '+COLORS[type];
      container.appendChild(d);
    });
  }

  function renderNext(){
    renderMini(document.getElementById('next-box-0'), queue[0]);
  }

  function updateHUD(){
    document.getElementById('score-value').textContent = score;
    document.getElementById('level-value').textContent = currentLevelDisplay();
    document.getElementById('lines-value').textContent = totalLines;
    renderNext();
  }

  function resizeField(){
    var wrap = document.querySelector('.field-wrap');
    var availW = wrap.clientWidth;
    var availH = wrap.clientHeight;
    var w = availW, h = w*(ROWS/COLS);
    if(h>availH){ h = availH; w = h*(COLS/ROWS); }
    fieldEl.style.width = Math.floor(w)+'px';
    fieldEl.style.height = Math.floor(h)+'px';
  }

  // ---- input ----
  function startRepeat(dir){
    dasState.dir = dir; dasState.timer = 0; dasState.fired = false;
    moveActive(dir,0);
  }
  function stopRepeat(dir){
    if(dasState.dir===dir){ dasState.dir=0; dasState.timer=0; dasState.fired=false; }
  }
  function handleDAS(dt){
    if(dasState.dir!==0){
      dasState.timer += dt;
      var threshold = dasState.fired ? ARR_INTERVAL : DAS_DELAY;
      if(dasState.timer>=threshold){
        dasState.timer = 0; dasState.fired = true;
        moveActive(dasState.dir,0);
      }
    }
  }

  function togglePause(){
    if(gameOverFlag) return;
    paused = !paused;
    document.getElementById('pause-overlay').classList.toggle('show', paused);
    if(paused) softDropping = false;
  }

  function startSoftDrop(){ softDropping = true; }
  function stopSoftDrop(){ softDropping = false; }

  document.getElementById('btn-left').addEventListener('pointerdown', function(e){ e.preventDefault(); startRepeat(-1); });
  document.getElementById('btn-left').addEventListener('pointerup', function(){ stopRepeat(-1); });
  document.getElementById('btn-left').addEventListener('pointerleave', function(){ stopRepeat(-1); });
  document.getElementById('btn-right').addEventListener('pointerdown', function(e){ e.preventDefault(); startRepeat(1); });
  document.getElementById('btn-right').addEventListener('pointerup', function(){ stopRepeat(1); });
  document.getElementById('btn-right').addEventListener('pointerleave', function(){ stopRepeat(1); });
  document.getElementById('btn-drop').addEventListener('pointerdown', function(e){ e.preventDefault(); startSoftDrop(); });
  document.getElementById('btn-drop').addEventListener('pointerup', function(){ stopSoftDrop(); });
  document.getElementById('btn-drop').addEventListener('pointerleave', function(){ stopSoftDrop(); });
  document.getElementById('btn-rotate').addEventListener('pointerdown', function(e){ e.preventDefault(); rotateActive(); });
  document.getElementById('close-btn').addEventListener('click', togglePause);
  document.getElementById('resume-btn').addEventListener('click', function(){
    togglePause();
    playRestartSound();
  });
  document.getElementById('retry-btn').addEventListener('click', function(){
    resetGame();
    playRestartSound();
  });
  document.getElementById('gift-retry-btn').addEventListener('click', function(){
    resetGame();
    playRestartSound();
  });
  document.getElementById('gift-close-btn').addEventListener('click', function(){
    document.getElementById('gift-main').style.display = 'none';
    document.getElementById('gift-rank-section').style.display = 'flex';
    giftRankPanel.open(giftPendingScore);
  });

  var goRankPanel = createRankingPanel({input:'name-input-go', submit:'name-submit-go', skip:'name-skip-go', entry:'name-entry-go', list:'ranking-list-go'});
  var giftRankPanel = createRankingPanel({input:'name-input-gift', submit:'name-submit-gift', skip:'name-skip-gift', entry:'name-entry-gift', list:'ranking-list-gift'});

  // ---- sound ----
  var soundOn = false;
  var bgm = document.getElementById('bgm');
  var sfxCatris = document.getElementById('sfx-catris');
  var sfxGameover = document.getElementById('sfx-gameover');
  var sfxDrop = document.getElementById('sfx-drop');
  bgm.volume = 0.5;
  function playRestartSound(){
    if(!soundOn) return;
    sfxCatris.currentTime = 0;
    sfxCatris.play().catch(function(){});
  }
  function setSound(on){
    soundOn = on;
    document.getElementById('sound-icon-use').setAttribute('href', soundOn ? '#icon-sound-on' : '#icon-sound-off');
    if(soundOn){ bgm.currentTime = bgm.currentTime || 0; bgm.play().catch(function(){}); }
    else { bgm.pause(); }
  }
  document.getElementById('sound-btn').addEventListener('click', function(){ setSound(!soundOn); });

  var usedKeys = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'];
  window.addEventListener('keydown', function(e){
    if(usedKeys.indexOf(e.code)!==-1) e.preventDefault();
    if(paused){ if(e.code==='KeyP'){ togglePause(); } return; }
    if(gameOverFlag) return;
    if(e.repeat){
      return;
    }
    switch(e.code){
      case 'ArrowLeft': startRepeat(-1); break;
      case 'ArrowRight': startRepeat(1); break;
      case 'ArrowUp': rotateActive(); break;
      case 'ArrowDown': startSoftDrop(); break;
      case 'KeyP': togglePause(); break;
    }
  });
  window.addEventListener('keyup', function(e){
    if(e.code==='ArrowLeft') stopRepeat(-1);
    if(e.code==='ArrowRight') stopRepeat(1);
    if(e.code==='ArrowDown') stopSoftDrop();
  });

  window.addEventListener('resize', resizeField);

  // ---- main loop ----
  function tick(time){
    var dt = time - lastTime;
    if(dt>100) dt=100;
    lastTime = time;

    if(!paused && !gameOverFlag && current){
      var interval = speedForStage(currentSpeedStageIndex());
      if(softDropping){ interval = Math.max(SOFT_DROP_MIN_INTERVAL, interval/SOFT_DROP_MULTIPLIER); }
      gravityAcc += dt;
      while(gravityAcc>=interval){
        gravityAcc -= interval;
        moveActive(0,1);
      }
      if(isResting()){
        if(lockTimer===null) lockTimer = LOCK_DELAY;
        lockTimer -= dt;
        if(lockTimer<=0){ lockPiece(); }
      } else {
        lockTimer = null; lockResets = 0;
      }
      handleDAS(dt);
    }

    renderActiveAndGhost();
    requestAnimationFrame(tick);
  }

  // ---- init ----
  buildGridBg();
  resizeField();
  updateHUD();
  renderLocked();
  spawnPiece();
  setSound(false);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(resizeField); }
  requestAnimationFrame(function(t){ lastTime=t; requestAnimationFrame(tick); });

})();
</script>
</body>
</html>
